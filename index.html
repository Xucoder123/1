<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的链接页面</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        
        h1 { color: #333; margin-bottom: 30px; }
        
        /* 链接样式 */
        .link-button {
            display: inline-block;
            padding: 15px 30px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .link-button:hover {
            background: #764ba2;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
        }
        
        .link-text {
            color: #667eea;
            text-decoration: underline;
            font-size: 16px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>点击下面的链接</h1>
        
        <!-- 方式1: 按钮式链接 -->
        <a href="https://www.example.com" class="link-button" target="_blank">
            ?? 访问示例网站
        </a>
        
        <br><br>
        
        <!-- 方式2: 文字链接 -->
        <a href="https://www.baidu.com" class="link-text" target="_blank">
            访问百度
        </a>
        
        <br><br>
        
        <!-- 方式3: 邮件链接 -->
        <a href="mailto:someone@example.com" class="link-text">
            ?? 发送邮件给我
        </a>
        
        <br><br>
        
        <!-- 方式4: 下载链接 -->
        <a href="/files/document.pdf" class="link-text" download>
            ?? 下载文件
        </a>
    </div>
</body>
</html>
